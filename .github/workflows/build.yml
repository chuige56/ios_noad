name: Build NoAd Dylib

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Theos + ldid
        run: |
          export THEOS=/Users/runner/theos
          git clone --depth 1 https://github.com/theos/theos.git $THEOS
          export HOMEBREW_NO_INSTALL_FROM_API=1
          brew install ldid 2>/dev/null || echo "ldid skipped"

      - name: Build dylib
        run: |
          export THEOS=/Users/runner/theos
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noad-dylib
          path: .theos/obj/arm64/noad.dylib
