name: Build NoAd Dylib

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Theos + ldid
        run: |
          export THEOS=/Users/runner/theos
          git clone --depth 1 https://github.com/theos/theos.git $THEOS
          # Download pre-built ldid (bypasses Homebrew issues)
          curl -sSL https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5procursus7/ldid_macos_x86_64 -o /usr/local/bin/ldid
          chmod +x /usr/local/bin/ldid
          ldid --version

      - name: Build dylib
        run: |
          export THEOS=/Users/runner/theos
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noad-dylib
          path: .theos/obj/arm64/noad.dylib
